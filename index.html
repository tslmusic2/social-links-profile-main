<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

        <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
        <link rel="stylesheet" href="styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        
        <title>Frontend Mentor | Social links profile</title>

        <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
        <style>
        .attribution { font-size: 0.6875rem; text-align: center; }
        .attribution a { color: hsl(228, 45%, 44%); }
        </style>
</head>
<body>
        <main>
                <div class="profile-info">
                        <img class="profile-img" src="assets/images/avatar-jessica.jpeg" alt="Jessica Randall">
                        <h1>Jessica Randall</h1>
                        <p>London, United Kingdom</p>
                        <p>"Front-end developer and avid reader."</p>
                        <ul  class="profile-links">
                                <li class="links github"><a href="github.com">GitHub</a></li>
                                <li class="links frontendmentor"><a href="frontendmentor.com">Frontend Mentor</a></li>
                                <li class="links linkedin"><a href="linkedin.com"> LinkedIn</a></li>
                                <li class="links twitter"><a href="x.com"> Twitter</a></li>
                                <li class="links instagram"><a href="instagram.com"> Instagram</a></li>
                        </ul>
                </div>
        </main>
        <footer class="attribution">
                Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
                Coded by <a href="#">Paul Papantonio</a>.
        </footer>
</body>
</html>
